# Robolectric reads this file via PackagePropertiesLoader. The root-level
# (empty package) form applies to every test class.
#
# instrumentedPackages tells the Robolectric sandbox classloader to acquire
# and instrument classes under these package prefixes, rather than letting
# them fall through to the system "app" classloader. Without this, our own
# Activity / View subclasses (in io.kotest.tests.robolectric) are loaded
# by the system classloader while their `android.app.Activity` superclass
# is loaded by the sandbox classloader - the two classloaders define
# distinct `android.app.Activity` types, and any cast between them throws
# ClassCastException.
instrumentedPackages=io.kotest.tests.robolectric
