# Robolectric reads this file via PackagePropertiesLoader. The package-scoped
# form (under com/sksamuel/kotest/robolectric/) applies to every test class in
# that package - which is where the JUnit 4 WelcomeActivityTest lives.
#
# instrumentedPackages tells the Robolectric sandbox classloader to acquire
# and instrument classes under these package prefixes, rather than letting
# them fall through to the system "app" classloader. Without this, our own
# Activity / View subclasses are loaded by the system classloader while their
# `android.app.Activity` superclass is loaded by the sandbox classloader -
# the two classloaders define distinct `android.app.Activity` types, and any
# cast between them throws ClassCastException.
#
# The Kotest equivalent test (WelcomeActivityKotestTest) opts in via the
# `@Config(instrumentedPackages = [...])` annotation on the spec class, read
# directly by RobolectricExtension - no properties file required.
instrumentedPackages=com.sksamuel.kotest.tests.robolectric
